<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="8" fill="#1e2130"/>
  <!-- Monitor frame -->
  <rect x="5" y="6" width="38" height="26" rx="3" fill="none" stroke="#17a2b8" stroke-width="2"/>
  <!-- Screen inner -->
  <rect x="8" y="9" width="32" height="20" rx="1.5" fill="#0d1520"/>
  <!-- VM layers (stacked rectangles suggesting virtualization) -->
  <rect x="12" y="13" width="24" height="5" rx="1.5" fill="none" stroke="#17a2b8" stroke-width="1.5"/>
  <rect x="14" y="15" width="24" height="5" rx="1.5" fill="none" stroke="#17a2b8" stroke-width="1.5" opacity="0.7"/>
  <rect x="16" y="17" width="24" height="5" rx="1.5" fill="none" stroke="#17a2b8" stroke-width="1.5" opacity="0.4"/>
  <!-- VM label -->
  <text x="24" y="27.5" text-anchor="middle" font-size="6" font-family="monospace" fill="#17a2b8" font-weight="bold">VM</text>
  <!-- Stand -->
  <line x1="24" y1="32" x2="24" y2="39" stroke="#17a2b8" stroke-width="2"/>
  <rect x="16" y="38" width="16" height="3" rx="1.5" fill="#17a2b8" opacity="0.6"/>
</svg>
