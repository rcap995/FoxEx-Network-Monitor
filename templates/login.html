<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – FoxEx Network Monitor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100 bg-login">
  <div class="login-logo-wrap">
    <img src="/static/icons/logo.png" alt="FoxEx Logo" class="login-logo">
  </div>
  <div class="login-card card shadow-lg p-4" style="width:400px">
    <div class="text-center mb-4">
      <p class="text-muted small mb-0">Network Monitor</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Benutzername</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Passwort</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right"></i> Anmelden
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
